<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulso Logo Render</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #39FF14;
            --text: #FFFFFF;
        }
        body {
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 40px;
            background: var(--bg);
        }
        .logo-bars {
            display: flex;
            align-items: flex-end;
            gap: 5px;
            height: 42px;
        }
        .logo-bar {
            width: 5px;
            border-radius: 2px;
        }
        .brand-text {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            color: var(--text);
        }
        .accent-dot {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="logo-container" id="logo-render">
        <div class="logo-bars">
            <div class="logo-bar" style="background: var(--text); height: 28px;"></div>
            <div class="logo-bar" style="background: var(--accent); height: 42px;"></div>
            <div class="logo-bar" style="background: var(--text); height: 18px;"></div>
        </div>
        <div class="brand-text">
            PULSO<span class="accent-dot">.</span>APP
        </div>
    </div>
</body>
</html>
